version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: meishi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meishi_user
      POSTGRES_PASSWORD: meishi_password
      POSTGRES_DB: meishi_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U meishi_user -d meishi_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
